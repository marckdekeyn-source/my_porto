<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark | Cyber Security Portfolio</title>
    <meta name="description" content="Cyber Security student specializing in Vulnerability Assessment & Penetration Testing (VAPT), Web Application Security Testing, Malware Analysis, Digital Forensics, and Capture The Flag (CTF).">
    <meta name="keywords" content="Cyber Security, VAPT, Penetration Testing, Web Security, Malware Analysis, Digital Forensics, Linux, Burp Suite, OWASP ZAP, Nmap, Wireshark, Networking, Capture The Flag">
    <link rel="icon" href="{{ url_for('static', filename='image/Sc.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=13.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <noscript><style>#introScreen{ display: none; }</style></noscript>

    <div id="introScreen">
        <div class="intro-terminal">
            <span id="introText"></span><span class="intro-cursor" id="introCursor"></span>
        </div>
        <button id="introSkip" class="intro-skip" type="button">Skip Intro</button>
    </div>

    <div class="ambient-glow"></div>
    <div class="noise-bg"></div>
    <div class="scroll-progress" id="scrollProgress"></div>

    <nav class="nav">
        <a href="/" class="logo magnetic">MARK.</a>
        <div class="nav-links">
            <a href="/#about" class="magnetic">About</a>
            <a href="/#background" class="magnetic">Background</a>
            <a href="/#work" class="magnetic">Works</a>
        </div>
    </nav>

    <div class="social-fixed">
        <a href="{{ profile.github }}" target="_blank" class="magnetic"><i class="fa-brands fa-github"></i></a>
        <a href="{{ profile.linkedin }}" target="_blank" class="magnetic"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>

    <button id="backToTop" class="back-to-top magnetic"><i class="fa-solid fa-arrow-up"></i></button>

    <div id="lightboxOverlay">
        <div class="lightbox-content">
            <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close preview"><i class="fa-solid fa-xmark"></i></button>
            <img id="lightboxImg" src="" alt="Preview">
            <p class="lightbox-caption" id="lightboxCaption"></p>
        </div>
    </div>

    <main id="smooth-wrapper">
        <div id="smooth-content">
            
            {% block content %}{% endblock %}

            <footer>
                <div class="container">
                    <p class="footer-subtitle">Ready to Elevate Your Digital Security?</p>
                    <a href="mailto:{{ profile.email }}" class="footer-link magnetic">GET IN TOUCH</a>
                    <p class="footer-copyright">&copy; 2026 {{ profile.name }}. All Rights Reserved.</p>
                </div>
            </footer>
            
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}?v=13.0"></script>
</body>
</html>
